; Config aqtinstall pour la CI — corrige les échecs de récupération de checksum.
; aqt télécharge le hash de Updates.xml depuis trusted_mirrors (indépendant de
; --base) ; la liste par défaut peut flancher. On fournit plusieurs sources
; fiables + des retries généreux.
[requests]
connection_timeout: 30
response_timeout: 30
max_retries_on_connection_error: 5
max_retries_on_checksum_error: 5
max_retries_to_retrieve_hash: 10
retry_backoff: 0.5

[mirrors]
trusted_mirrors:
  https://download.qt.io
  https://mirrors.ocf.berkeley.edu/qt
  https://ftp.fau.de/qtproject
  https://mirror.netcologne.de/qtproject
fallback_mirrors:
  https://download.qt.io
  https://mirrors.ocf.berkeley.edu/qt
  https://ftp.fau.de/qtproject
  https://mirror.netcologne.de/qtproject
